name: Publish to Maven Central

# Scaffolded but inactive until PR 7 (Phase 8.4b.15 release).
# Triggered on semver tags (e.g. v0.1.0, v1.0.0).
# Every step is gated on the publish credentials being present — when any
# secret is missing the job exits cleanly without partially publishing.

on:
  push:
    tags: ['v*']

jobs:
  verify:
    name: Verify build + JVM tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble release
        run: ./gradlew --no-daemon assembleRelease

      - name: JVM unit tests
        run: ./gradlew --no-daemon test

      - name: ktlint + detekt
        run: ./gradlew --no-daemon ktlintCheck detekt

  publish:
    name: Publish to Sonatype Central Portal (NMCP aggregation)
    needs: verify
    runs-on: ubuntu-latest
    # Skip when MAVEN_PUBLISH_ENABLED variable is false/unset — keeps
    # accidental tag pushes from publishing before secrets are visible.
    if: >-
      ${{ vars.MAVEN_PUBLISH_ENABLED == 'true' }}
    env:
      # Secret names aligned with PYRX-Tech/pyrx-synapse-java (live since 2026-05-02).
      # The 4 secrets are recommended as PYRX-Tech org-level secrets so this
      # workflow + the Java SDK workflow + any future JVM SDK repo share one
      # source of truth.
      #
      # NMCP plugin reads CENTRAL_USERNAME + CENTRAL_PASSWORD from process env
      # (configured in root build.gradle.kts nmcpAggregation { centralPortal { ... } }).
      # Signing plugin reads GPG_PRIVATE_KEY + GPG_PASSPHRASE the same way
      # (configured per-module in synapse-core / synapse-push build.gradle.kts).
      CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
      CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # NMCP aggregation publishes synapse-core + synapse-push (synapse-inapp
      # is excluded by design — Phase 9 reactivates it). The task uploads a
      # single bundle ZIP to https://central.sonatype.com/api/v1/publisher/.
      # With publishingType = "USER_MANAGED" the deployment requires a manual
      # "Publish" click in the Central Portal dashboard after upload — safe
      # for first v0.1.0 dry-run. Flip to AUTOMATIC in root build.gradle.kts
      # after the first verified release.
      - name: Publish aggregated bundle to Central Portal
        run: ./gradlew --no-daemon publishAggregatedPublicationToCentralPortal

  github-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
