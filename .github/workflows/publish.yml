name: Publish to Maven Central

# Scaffolded but inactive until PR 7 (Phase 8.4b.15 release).
# Triggered on semver tags (e.g. v0.1.0, v1.0.0).
# Every step is gated on the publish credentials being present — when any
# secret is missing the job exits cleanly without partially publishing.

on:
  push:
    tags: ['v*']

jobs:
  verify:
    name: Verify build + JVM tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Assemble release
        run: ./gradlew --no-daemon assembleRelease

      - name: JVM unit tests
        run: ./gradlew --no-daemon test

      - name: ktlint + detekt
        run: ./gradlew --no-daemon ktlintCheck detekt

  publish:
    name: Publish to Sonatype OSSRH
    needs: verify
    runs-on: ubuntu-latest
    # Skip entirely if any required publish secret is unset — keeps PR 1
    # safe to merge before secrets are provisioned in PR 7.
    if: >-
      ${{ vars.MAVEN_PUBLISH_ENABLED == 'true' }}
    env:
      ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
      ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Sonatype Central publish — wired in PR 7 when we add the signing
      # plugin + nexus-publish plugin configuration. The command below is
      # the placeholder shape; the actual task names land with PR 7.
      - name: Publish release artifacts
        run: |
          ./gradlew --no-daemon \
            publishReleasePublicationToSonatypeRepository \
            closeAndReleaseSonatypeStagingRepository

  github-release:
    name: Create GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
